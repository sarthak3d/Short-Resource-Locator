spring.application.name=srlAnalytics

# Supabase PostgreSQL — set via environment variables
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# pgBouncer (Supabase) compatibility — disable server-side prepared statements
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheQueries=0
spring.datasource.hikari.data-source-properties.pipelining=0

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VIRTUAL_HOST:/}

# Shared JWT secret — must be byte-for-byte identical to srlDashboard's jwt.secret
jwt.secret=${JWT_SECRET}

# Response Projection Engine
response.projection.enabled=true
response.projection.header-name=X-Response-Fields
response.projection.max-depth=3
response.projection.cache.enabled=true
response.projection.cache.default-ttl-seconds=60
response.projection.cache.collection-ttl-seconds=30
